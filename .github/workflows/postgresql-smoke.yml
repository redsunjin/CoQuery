name: postgresql-smoke

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgresql-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coquery_probe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d coquery_probe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run PostgreSQL smoke proof
        env:
          COQUERY_PG_DB_URI: postgresql://postgres:postgres@127.0.0.1:5432/coquery_probe
          COQUERY_PSQL_URI: postgresql://postgres:postgres@127.0.0.1:5432/coquery_probe
        run: bash scripts/run_postgresql_local_smoke.sh
